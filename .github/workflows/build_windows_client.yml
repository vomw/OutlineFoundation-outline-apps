name: Build Outline Client / Windows

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Client
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - name: Support longpaths
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install NPM Dependencies
        run: npm ci

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Tidy Go Modules
        run: go mod tidy

      - name: Install zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
          use-cache: false

      - name: Build Windows Client
        run: npm run action client/electron/build windows

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Outline-Client-Windows
          path: |
            output/client/electron/build/*.zip
            output/client/electron/build/*.exe
            output/client/electron/build/*.blockmap

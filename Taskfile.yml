version: '3'

set: [pipefail]

run: when_changed

includes:
  client:socks5-proxy: ./client/go/Taskfile.yml
  client:
    taskfile: ./client/Taskfile.yml
    vars:
      OUTPUT_DIR: '{{joinPath .ROOT_DIR "output" "client"}}'

tasks:
  clean:
    deps:
      - client:socks5-proxy:clean
    cmds:
      - rm -rf .task

  addlicense:
    desc: Add missing license headers
    cmds:
      - go tool addlicense {{.CLI_ARGS}} -c "The Outline Authors" -l apache -ignore 'output/**' -ignore 'node_modules/**' -ignore 'third_party/**' -v .
